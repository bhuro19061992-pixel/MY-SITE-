<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Creations 03 - Full Background Waterfall</title>
  <style>
    /* મુખ્ય વેબસાઈટ સેટિંગ્સ */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      /* ૧. આખા બેકગ્રાઉન્ડમાં ઓરિજિનલ વોટરફોલ ઈમેજ */
      background-image: url('waterfall-bg.jpg'); /* અહીં તમારી વોટરફોલ ઈમેજનો પાથ મૂકવો */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    /* --- ૨. વાસ્તવિક લુક માટે ઝરણાનું ધુમ્મસ (Water Mist Effect) --- */
    .mist-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 250px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 80%);
      pointer-events: none;
      z-index: 2;
      animation: mistMove 6s ease-in-out infinite alternate;
    }

    @keyframes mistMove {
      0% { transform: translateY(10px) scale(0.95); opacity: 0.6; }
      100% { transform: translateY(-10px) scale(1.05); opacity: 0.9; }
    }

    /* --- ૩. લાલ હોડીની એનિમેશન (Swaying Red Boat) --- */
    /* જો તમે ઈચ્છો તો ચિત્રની જેમ નીચે નાની લાલ હોડી ધીમે-ધીમે હલતી મૂકી શકો છો */
    .red-boat {
      position: fixed;
      bottom: 40px;
      left: 30%;
      width: 140px;
      height: auto;
      pointer-events: none;
      z-index: 3;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
      animation: boatFloat 4s ease-in-out infinite alternate;
    }

    @keyframes boatFloat {
      0% { transform: translateY(0) rotate(-1deg); }
      100% { transform: translateY(-8px) rotate(2deg); }
    }


    /* --- ૪. બેનર સાથે ઉડતી ચકલીઓ (Flying Birds with Banner) --- */
    .bird-banner-carrier {
      position: fixed;
      top: 40px; /* આકાશની ઉંચાઈ */
      width: 500px; /* તમારા ક્રોપ કરેલા બેનરની સાઈઝ મુજબ સેટ કરો */
      height: 250px;
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 10;
      pointer-events: none;
      /* બે એનિમેશન: આડી ઉડાન અને ઉભી ધ્રુજારી (Wobble) */
      animation: 
        flyAcross 24s linear infinite, 
        flyWobble 2s ease-in-out infinite alternate;
    }

    /* ઉભી ધ્રુજારી (વાસ્તવિક પાંખોની ગતિ દર્શાવવા) */
    @keyframes flyWobble {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    /* આડી ઉડાન અને ડાયરેક્શન બદલતી વખતે ઈમેજ સ્વિચિંગ એનિમેશન */
    @keyframes flyAcross {
      /* ૧. ડાબેથી જમણે ઉડાન (Left to Right) */
      0% {
        left: -550px;
        background-image: url('birds-ltr.png'); /* ડાબેથી જમણે જતું ક્રોપ કરેલું ટ્રાન્સપરન્ટ ચિત્ર */
      }
      49% {
        left: 100vw;
        background-image: url('birds-ltr.png');
      }
      
      /* ૨. જમણી કિનારે પહોંચીને પાત્ર બદલવું (સ્મૂથ ફ્લિપ) */
      50% {
        left: 100vw;
        background-image: url('birds-rtl.png'); /* જમણેથી ડાબે આવતું ક્રોપ કરેલું ટ્રાન્સપરન્ટ ચિત્ર */
      }
      
      /* ૩. જમણેથી ડાબે ઉડાન (Right to Left) */
      99% {
        left: -550px;
        background-image: url('birds-rtl.png');
      }
      100% {
        left: -550px;
        background-image: url('birds-ltr.png');
      }
    }


    /* --- ૫. વેબસાઈટના લખાણનું કન્ટેન્ટ બોક્સ --- */
    /* વોટરફોલ બેકગ્રાઉન્ડ સરસ દેખાય તે માટે લખાણ વચ્ચે અર્ધ-પારદર્શક ગ્લાસ બોક્સમાં રહેશે */
    .main-content {
      position: relative;
      z-index: 5;
      max-width: 700px;
      margin: 100px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px); /* ગ્લાસ ઈફેક્ટ */
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      color: white;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .main-content h1 {
      font-size: 38px;
      margin-top: 0;
      color: #fff;
    }

    .main-content p {
      font-size: 16px;
      line-height: 1.6;
      color: #e0f2f1;
    }

    .cta-button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, #00b0ff, #0081cb);
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0, 176, 255, 0.4);
      transition: transform 0.2s;
    }
    .cta-button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <!-- વાસ્તવિક જળપ્રપાત ધુમ્મસ ઈફેક્ટ -->
  <div class="mist-overlay"></div>

  <!-- લાલ હોડી (પિક્ચર જેવી ફીલ લાવવા માટે) -->
  <!-- જો તમારી પાસે લાલ હોડીનું transparent PNG હોય તો લિંક મૂકી શકો છો, અથવા આ લાઈન કાઢી શકો છો -->
  <img class="red-boat" src="https://images.cf-assets.com/ (અથવા તમારી પોતાની લાલ બોટ ઇમેજ)" alt="" onerror="this.style.display='none'">

  <!-- બેનર સાથે ઉડતી ચકલીઓ -->
  <div class="bird-banner-carrier"></div>

  <!-- વેબસાઈટ કન્ટેન્ટ એરિયા -->
  <div class="main-content">
    <h1>String Creations 03</h1>
    <p>અમે લાવ્યા છીએ તમારા માટે અદ્ભુત 3D ગ્રાફિક્સ અને વેબસાઈટ ડિઝાઇન્સ. આખા પેજ પર બેકગ્રાઉન્ડમાં સુંદર કુદરતી જરણું વહી રહ્યું છે અને ઉપર આકાશમાં ચકલીઓ અમારું ઓરિજિનલ બેનર લઈને ઉડી રહી છે.</p>
    <a href="#" class="cta-button">વધુ જાણો</a>
  </div>

</body>
</html>
