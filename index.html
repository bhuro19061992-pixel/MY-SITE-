<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waterfall & Flying Birds with Logo</title>
  <style>
    /* મુખ્ય બોડી સેટિંગ્સ */
    body {
      margin: 0;
      padding: 0;
      position: relative;
      min-height: 100vh; /* પેજ ગમે તેટલું લાંબુ હોય */
      background-color: #f0f4f8;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    /* --- ૧. વહેતા ઝરણાની CSS (Waterfall) --- */
    .waterfall-left, .waterfall-right {
      position: absolute;
      top: 0;
      bottom: 0; /* છેક તળિયા સુધી ખેંચાશે */
      width: 45px;
      z-index: 5;
      pointer-events: none; /* કન્ટેન્ટ ક્લિક કરવામાં નડતર ન બને */
      overflow: hidden;
    }

    /* ડાબી અને જમણી બાજુ પ્લેસમેન્ટ */
    .waterfall-left { left: 0; }
    .waterfall-right { right: 0; }

    /* પાણીનો વહેતો પ્રવાહ */
    .water-stream {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* પાણી જેવો કલર ગ્રેડિએન્ટ */
      background: linear-gradient(to bottom, rgba(30, 144, 255, 0.7), rgba(0, 191, 255, 0.5));
      box-shadow: inset -5px 0 10px rgba(255,255,255,0.3), inset 5px 0 10px rgba(0,0,0,0.1);
    }

    /* વહેતી લહેરોનું એનિમેશન */
    .water-stream::before {
      content: "";
      position: absolute;
      top: -100px;
      left: 0;
      width: 100%;
      height: 200%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 30px,
        rgba(255, 255, 255, 0.6) 35px,
        rgba(255, 255, 255, 0.6) 45px,
        transparent 50px
      );
      animation: flowDown 2.5s linear infinite;
    }

    @keyframes flowDown {
      0% { transform: translateY(-50%); }
      100% { transform: translateY(0); }
    }

    /* ઝરણાની નીચે પાણીના ઉડતા છાંટા (Splash Effect) */
    .water-splash {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 30px;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 10%, transparent 70%);
      animation: splashWave 1s ease-in-out infinite alternate;
    }

    @keyframes splashWave {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }


    /* --- ૨. ઉડતી ચકલી અને લોગો ઝંડો (Flying Birds & Flag) --- */
    .sky-container {
      position: fixed;
      top: 30px; /* આકાશની ઊંચાઈ */
      left: 0;
      width: 100%;
      height: 150px;
      pointer-events: none;
      z-index: 100;
    }

    /* ચકલી લાવનાર કન્ટેનર */
    .bird-carrier {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* બેક અને ફોર્થ એનિમેશન સેટિંગ્સ */
      animation: flyBackAndForth 22s linear infinite;
    }

    /* ચકલી ૧ અને ૨ માટે અલગ ઊંચાઈ અને સ્પીડ આપવા માટે */
    .bird-carrier-2 {
      top: 60px;
      animation: flyBackAndForth 16s linear infinite reverse; /* વિરુદ્ધ દિશામાં ચાલશે */
    }

    /* ચકલી ઇમોજી અથવા આઇકોન */
    .bird {
      font-size: 42px;
      display: inline-block;
      /* પાંખો ફફડાવવાનો લુક આપવા માટે */
      animation: wingFlap 0.4s ease-in-out infinite alternate;
    }

    /* પાંખો ફફડાવવી */
    @keyframes wingFlap {
      0% { transform: translateY(0) rotate(-5deg); }
      100% { transform: translateY(-5px) rotate(5deg); }
    }

    /* ચાંચમાંથી લટકતું દોરડું */
    .beak-rope {
      width: 3px;
      height: 25px;
      background-color: #555;
      margin-top: -5px;
      transform-origin: top center;
      animation: ropeSwing 1.5s ease-in-out infinite alternate;
    }

    /* લટકતો લોગો વાળો ઝંડો (Logo Flag) */
    .logo-flag {
      background: #ffffff;
      border: 2.5px solid #ff9800;
      border-radius: 5px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      transform-origin: top center;
      animation: flagSway 1.5s ease-in-out infinite alternate;
    }

    /* લોગો ઈમેજ સ્ટાઈલ */
    .flag-logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      background-color: #eee;
    }

    /* ઝંડાનું લખાણ */
    .flag-text {
      font-size: 11px;
      font-weight: bold;
      color: #333;
      white-space: nowrap;
    }

    /* દોરડું અને ઝંડો હવામાં લહેરાય તે માટે એનિમેશન */
    @keyframes ropeSwing {
      0% { transform: rotate(-8deg); }
      100% { transform: rotate(8deg); }
    }
    @keyframes flagSway {
      0% { transform: rotate(-5deg) skewX(-3deg); }
      100% { transform: rotate(5deg) skewX(3deg); }
    }

    /* --- ૩. ડાબેથી જમણે અને જમણેથી ડાબે જવાની એનિમેશન --- */
    /* નોંઘ: સ્ટાન્ડર્ડ ચકલી 🐦 નો ફેસ ડાબી બાજુ હોય છે. તેથી જમણી બાજુ ઉડાડવા માટે scaleX(-1) કરવો પડે. */
    @keyframes flyBackAndForth {
      0% { left: -150px; transform: scaleX(-1); } /* મોઢું જમણી બાજુ (flipped) */
      48% { left: 100vw; transform: scaleX(-1); }
      50% { left: 100vw; transform: scaleX(1); }  /* મોઢું ડાબી બાજુ (normal) */
      98% { left: -150px; transform: scaleX(1); }
      100% { left: -150px; transform: scaleX(-1); }
    }


    /* વેબસાઈટનું કન્ટેન્ટ એરિયા (ટેસ્ટિંગ માટે) */
    .website-content {
      max-width: 800px;
      margin: 80px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
      min-height: 1200px; /* સ્ક્રોલ ટેસ્ટ કરવા માટે મોટી હાઇટ */
    }
  </style>
</head>
<body>

  <!-- ૧. ડાબી અને જમણી બાજુનું વહેતું જરણું -->
  <div class="waterfall-left">
    <div class="water-stream"></div>
    <div class="water-splash"></div>
  </div>
  <div class="waterfall-right">
    <div class="water-stream"></div>
    <div class="water-splash"></div>
  </div>

  <!-- ૨. આકાશમાં ઉડતી ચકલીઓ અને ઝંડા -->
  <div class="sky-container">
    
    <!-- ચકલી ૧ (ડાબેથી જમણે) -->
    <div class="bird-carrier">
      <div class="bird">🐦</div>
      <div class="beak-rope"></div>
      <div class="logo-flag">
        <!-- અહીં YOUR_LOGO_IMAGE_URL ની જગ્યાએ તમારા લોગોની લિંક મૂકો -->
        <img class="flag-logo" src="https://api.dicebear.com/7.x/identicon/svg?seed=Logo1" alt="Logo">
        <span class="flag-text">MY BRAND</span>
      </div>
    </div>

    <!-- ચકલી ૨ (જમણેથી ડાબે - વિરુદ્ધ દિશામાં ઉડશે) -->
    <div class="bird-carrier bird-carrier-2">
      <div class="bird">🐦</div>
      <div class="beak-rope"></div>
      <div class="logo-flag">
        <img class="flag-logo" src="https://api.dicebear.com/7.x/identicon/svg?seed=Logo2" alt="Logo">
        <span class="flag-text">WELCOME</span>
      </div>
    </div>

  </div>

  <!-- વેબસાઈટનું લખાણ (તમારું હોમ પેજ આ રીતે વચ્ચે દેખાશે) -->
  <div class="website-content">
    <h1>મારી વેબસાઈટમાં તમારું સ્વાગત છે</h1>
    <p>આ પેજમાં ડાબી અને જમણી બાજુએ વહેતું જરણું સેટ કરેલું છે.</p>
    <p>ઉપર આકાશમાં ચકલીઓ બ્રાન્ડનો ઝંડો લઈને સતત ઉડી રહી છે.</p>
    <br><br>
    <p style="color: #777;">(તમે પેજને નીચે સ્ક્રોલ કરીને પણ જોઈ શકો છો, જરણું છેક નીચે સુધી વહેતું રહેશે.)</p>
  </div>

</body>
</html>
